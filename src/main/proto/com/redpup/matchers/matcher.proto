syntax = "proto3";

package com.redpup.matchers;

option java_multiple_files = true;
option java_package = "com.redpup.matchers.proto";

import "google/protobuf/empty.proto";

// Top level matcher message and the main entry point
// to the matcher framework.
message Matcher {
  oneof matcher {
    bool constant_matcher = 1;
    ValueMatcher value_matcher = 2;
    ValueInSetMatcher value_in_set_matcher = 3;
    ComparisonMatcher comparison_matcher = 4;
    StringMatcher string_matcher = 5;
    MessageMatcher message_matcher = 6;

    Matcher not_matcher = 7;
    CollectionMatcher collection_matcher = 8;
    CombiningMatcher combining_matcher = 9;
  }
}

// A matcher that matches an exact value.
message ValueMatcher {
  oneof value {
    bool bool_value = 1;
    int32 int32_value = 2;
    int64 int64_value = 3;
    float float_value = 4;
    double double_value = 5;
    string string_value = 6;
    int32 enum_value = 7;
  }
}

// A Matcher wrapping a set of values of a given type. The matcher matches
// any value in the set.
message ValueInSetMatcher {
  message Int32ValueSet {repeated int32 values = 1 [packed = true];}
  message Int64ValueSet {repeated int64 values = 1 [packed = true];}
  message FloatValueSet {repeated float values = 1 [packed = true];}
  message DoubleValueSet {repeated double values = 1 [packed = true];}
  message StringValueSet {repeated string values = 1;}

  oneof values {
    Int32ValueSet int32_values = 1;
    Int64ValueSet int64_values = 2;
    FloatValueSet float_values = 3;
    DoubleValueSet double_values = 4;
    StringValueSet string_values = 5;
    Int32ValueSet enum_values = 6;
  }
}

// A matcher that matches an inequality.
message ComparisonMatcher {
  enum Comparison {
    COMPARISON_UNSET = 0;
    COMPARISON_EQ = 1;
    COMPARISON_NE = 2;
    COMPARISON_LT = 3;
    COMPARISON_LE = 4;
    COMPARISON_GE = 5;
    COMPARISON_GT = 6;
  }
  Comparison comparison = 1;

  oneof value {
    int32 int32_value = 2;
    int64 int64_value = 3;
    float float_value = 4;
    double double_value = 5;
    string string_value = 6;
    int32 enum_value = 7;
  }
}

// A matcher that matches on strings.
message StringMatcher {
  // Case sensitivity of this matcher. Defaults to CASE_SENSITIVE.
  enum CaseSensitivity {
    CASE_SENSITIVE = 0;
    CASE_INSENSITIVE = 1;
  }
  CaseSensitivity case_sensitive = 1;

  oneof matcher {
    // Matches a string exactly.
    string value = 2;
    // Matches strings that start with a value.
    string starts_with = 3;
    // Matches strings that end with a value.
    string ends_with = 4;
    // Matches strings that contain with a value.
    string contains = 5;
    // Matches strings that match the regex pattern.
    string pattern = 6;
  }
}

// A Matcher on a proto message input.
message MessageMatcher {
  // The full name of the message.
  string message_name = 1;

  // A matcher on a specific field in the message.
  // At least one of field_number and field_name must be populated.
  message FieldMatcher {
    int32 field_number = 1;
    string field_name = 2;
    Matcher matcher = 3;
  }

  // Fields that must match for the MessageMatcher to match.
  // Results are AND'ed: all fields must match for the surrounding matcher to
  // match.
  repeated FieldMatcher fields = 2;
}

// A matcher on that matches on a Collection<T> (or Iterable<T>, List<T>, etc)
// of input elements.
message CollectionMatcher {
  oneof matcher {
    // Matches if any element in the collection matches.
    Matcher any = 1;
    // Matches if all elements in the collection matches.
    Matcher all = 2;
    // Matches if no elements in the collection matches.
    Matcher none = 3;
    // Matches if the collection is empty.
    google.protobuf.Empty empty = 4;
    // Matches if the size of the collection matches
    Matcher size = 5;
    // Matches if each inner matcher matches a unique, distinct element in the
    // input collection (modeled as a bipartite matching assignment problem).
    //
    // At runtime, this executes using a backtracking search algorithm with a
    // worst-case time complexity of O(M * E^M) where M is the number of sub-matchers
    // and E is the size of the input collection.
    DistinctElementsMatcher contains_elements = 6;
  }

  message DistinctElementsMatcher {
    enum MatchType {
      MATCH_TYPE_UNKNOWN = 0;

      // Every matcher matches a unique element. Elements can be left over.
      // (e.g. elements >= matchers)
      MATCH_TYPE_SUPERSET_ELEMENTS = 1;

      // Exact 1:1 pairing. Every matcher matches a unique element and no elements are left over.
      // (e.g. elements == matchers)
      MATCH_TYPE_EXACT = 2;

      // Every element matches a unique matcher. Matchers can be left over.
      // (e.g. elements <= matchers)
      MATCH_TYPE_SUPERSET_MATCHERS = 3;
    }

    MatchType match_type = 1;
    repeated Matcher matchers = 2;
  }
}

// A Matcher wrapping a collection of other matchers and combining their results.
message CombiningMatcher {
  // Means of combining matcher results.
  enum Combine {
    COMBINE_UNSET = 0;
    COMBINE_ANY = 1;
    COMBINE_ALL = 2;
    COMBINE_NONE = 3;
  }
  Combine combine = 1;

  // The matchers inside this Combining Matcher.
  repeated Matcher matchers = 2;
}
