syntax = "proto3";

package com.redpup.matchers.testing;

option java_multiple_files = true;
option java_package = "com.redpup.matchers.testing.proto";

message TestMessage {
  bool bool_value = 1;
  int32 int32_value = 2;
  int64 int64_value = 3;
  float float_value = 4;
  double double_value = 5;
  string string_value = 6;
  TestEnum enum_value = 7;
}

enum TestEnum {
  TEST_ENUM_DEFAULT = 0;
  TEST_ENUM_1 = 1;
  TEST_ENUM_2 = 2;
}
